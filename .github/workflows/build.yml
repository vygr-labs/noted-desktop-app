name: Build & Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - windows
          - macos
          - linux
          - all
      create_release:
        description: 'Create a GitHub Release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & install dependencies
        working-directory: app
        run: |
          corepack enable
          yarn install --immutable

      - name: Build
        working-directory: app
        run: |
          yarn prepare
          yarn cli:build
          yarn run pre-build
          yarn exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-windows
          path: |
            app/release/*.exe
            app/release/*.yml
          if-no-files-found: warn

  build-macos:
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & install dependencies
        working-directory: app
        run: |
          corepack enable
          yarn install --immutable

      - name: Build
        working-directory: app
        run: |
          yarn prepare
          yarn cli:build
          yarn run pre-build
          yarn exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-macos
          path: |
            app/release/*.dmg
            app/release/*.yml
          if-no-files-found: warn

  build-linux:
    if: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Enable Corepack & install dependencies
        working-directory: app
        run: |
          corepack enable
          yarn install --immutable

      - name: Build
        working-directory: app
        run: |
          yarn prepare
          yarn cli:build
          yarn run pre-build
          yarn exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-linux
          path: |
            app/release/*.AppImage
            app/release/*.deb
            app/release/*.rpm
            app/release/*.snap
            app/release/*.yml
          if-no-files-found: warn

  release:
    needs: [build-windows, build-macos, build-linux]
    if: ${{ always() && inputs.create_release && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./app/package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: noted. v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.snap
            artifacts/**/*.tar.gz
            artifacts/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
