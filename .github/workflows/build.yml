name: Build & Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - windows
          - macos
          - linux
          - all

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build CLI
        run: yarn cli:build

      - name: Build & package
        run: yarn run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-windows
          path: |
            release/*.exe
            release/*.yml
          if-no-files-found: warn

  build-macos:
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build CLI
        run: yarn cli:build

      - name: Build & package
        run: yarn run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-macos
          path: |
            release/*.dmg
            release/*.yml
          if-no-files-found: warn

  build-linux:
    if: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build CLI
        run: yarn cli:build

      - name: Build & package
        run: yarn run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-linux
          path: |
            release/*.AppImage
            release/*.yml
          if-no-files-found: warn

