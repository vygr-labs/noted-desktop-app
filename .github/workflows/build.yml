name: Build & Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - windows
          - macos
          - linux
          - all
      create_release:
        description: 'Create a GitHub Release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve effective release version
        id: resolve
        run: |
          BASE=$(node -p "require('./app/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          CANDIDATE="$BASE"
          # Bump patch until tag is free both locally and on origin
          while git rev-parse "v$CANDIDATE" >/dev/null 2>&1 \
             || git ls-remote --exit-code --tags origin "v$CANDIDATE" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            CANDIDATE="$MAJOR.$MINOR.$PATCH"
          done
          echo "Resolved release version: $CANDIDATE (package.json: $BASE)"
          echo "version=$CANDIDATE" >> $GITHUB_OUTPUT

  build-windows:
    needs: resolve-version
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & install dependencies
        working-directory: app
        run: |
          corepack enable
          yarn install --immutable

      - name: Set package version (local, not committed)
        working-directory: app
        shell: bash
        run: npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build
        working-directory: app
        run: |
          yarn prepare
          yarn cli:build
          yarn run pre-build
          yarn exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-windows
          path: |
            app/release/*.exe
            app/release/*.yml
          if-no-files-found: warn

  build-macos:
    needs: resolve-version
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack & install dependencies
        working-directory: app
        run: |
          corepack enable
          yarn install --immutable

      - name: Set package version (local, not committed)
        working-directory: app
        run: npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build
        working-directory: app
        run: |
          yarn prepare
          yarn cli:build
          yarn run pre-build
          yarn exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-macos
          path: |
            app/release/*.dmg
            app/release/*.yml
          if-no-files-found: warn

  build-linux:
    needs: resolve-version
    if: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Enable Corepack & install dependencies
        working-directory: app
        run: |
          corepack enable
          yarn install --immutable

      - name: Set package version (local, not committed)
        working-directory: app
        run: npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build
        working-directory: app
        run: |
          yarn prepare
          yarn cli:build
          yarn run pre-build
          yarn exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-linux
          path: |
            app/release/*.AppImage
            app/release/*.deb
            app/release/*.rpm
            app/release/*.snap
            app/release/*.yml
          if-no-files-found: warn

  release:
    needs: [resolve-version, build-windows, build-macos, build-linux]
    if: ${{ always() && inputs.create_release && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          TAG="v${{ needs.resolve-version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: noted. v${{ needs.resolve-version.outputs.version }}
          draft: true
          make_latest: true
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.snap
            artifacts/**/*.tar.gz
            artifacts/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
