appId: com.voyagertech.noted
productName: noted
copyright: Copyright (c) 2026 Voyager Technologies Limited
artifactName: ${productName}-${os}-${arch}.${ext}

win:
  target: nsis
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeader: installer/header.bmp
  installerSidebar: installer/sidebar.bmp
  uninstallerSidebar: installer/sidebar.bmp
  license: ../LICENSE
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "noted."
  include: installer/installer.nsh

linux:
  target:
    - AppImage
    - deb
    - rpm
    - snap
  category: Utility
  icon: assets/icon.png

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - libatspi2.0-0
    - libuuid1

rpm:
  depends:
    - gtk3
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - at-spi2-core
    - libuuid

snap:
  grade: stable
  confinement: strict

mac:
  target: dmg
  category: public.app-category.productivity
  icon: assets/icon.icns

dmg:
  title: "noted."
  icon: assets/icon.icns

files: ['src/backend/build/**/*', 'dist/**/*']
extraResources: ['./assets/**', '../cli/build/**', './app.config.json']
directories:
  output: 'release'
  buildResources: 'assets'
