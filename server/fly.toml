app = 'noted-sync'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  DATA_DIR = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'noted_data'
  destination = '/data'
